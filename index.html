<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ultra Study Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

/* ================= APP LAYOUT ================= */
.app{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* ================= CARD ================= */
.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border-radius:22px;
    padding:22px;
    box-shadow:0 0 30px rgba(59,130,246,0.15);
    position:relative;
    overflow:hidden;
}

/* glowing border animation */
.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(90deg,#3b82f6,#10b981,#f59e0b,#8b5cf6);
    z-index:-1;
    filter:blur(20px);
    opacity:0.2;
}

/* ================= TITLE ================= */
h1{
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
    background:linear-gradient(90deg,#60a5fa,#34d399,#f59e0b,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= LABEL ================= */
label{
    font-size:13px;
    margin-top:10px;
    display:block;
    opacity:0.9;
}

/* ================= INPUTS ================= */
select,textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    outline:none;
    border-radius:12px;
    font-size:14px;
    background:rgba(255,255,255,0.95);
    color:black; /* FIX: dropdown + text now black */
    font-weight:500;
}

/* dropdown fix */
select option{
    color:black;
    background:white;
}

textarea{
    min-height:120px;
    resize:none;
}

/* ================= BUTTONS ================= */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:0.25s;
    letter-spacing:0.3px;
}

.btn-primary{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
}

.btn-mix{
    background:linear-gradient(135deg,#f59e0b,#d97706);
    color:black;
}

.btn-copy{
    background:linear-gradient(135deg,#10b981,#059669);
    color:white;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ================= OUTPUT ================= */
.output{
    min-height:260px;
    background:rgba(0,0,0,0.35);
    color:#e5e7eb;
    font-size:13px;
    white-space:pre-wrap;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .app{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="card">

<h1>🤖 AI Ultra Study Studio</h1>

<label>Language</label>
<select id="language">
<option>English</option>
<option>Hindi</option>
<option>Gujarati</option>
</select>

<label>Mode</label>
<select id="mode">
<option>Study Mode</option>
<option>Exam Mode</option>
<option>Revision Mode</option>
<option>Interview Mode</option>
</select>

<label>Topic</label>
<textarea id="topic" placeholder="Enter your topic..."></textarea>

<label>Base Knowledge</label>
<textarea id="answer" placeholder="Optional"></textarea>

<button class="btn-primary" onclick="generateNotes()">Generate Notes</button>

</div>

<!-- RIGHT -->
<div class="card">

<label>Style 1</label>
<select id="s1"></select>

<label>Style 2</label>
<select id="s2"></select>

<label>Style 3</label>
<select id="s3"></select>

<button class="btn-mix" onclick="mixStyles()">Mix AI Styles</button>

<label>Output</label>
<textarea id="output" class="output" readonly></textarea>

<button class="btn-copy" onclick="copyText()">Copy Output</button>

</div>

</div>

<script>

/* ================= STYLE LIBRARY ================= */
const styles = [
"Topper Notes Style",
"Mind Map Notes",
"Flowchart Notes",
"Infographic Notes",
"Cornell Notes",
"One-Page Revision Notes",
"Flashcard Notes",
"Timeline Notes",
"Comparison Notes",
"Mnemonic Notes",
"Diagram-Based Notes",
"Sticky Note Layout",
"Magazine Style Notes",
"Canva Style Notes",
"Notebook Journal Style",
"Research Paper Notes",
"Coaching Institute Notes",
"Storytelling Notes",
"Interactive Notes",
"Blueprint Style Notes",
"Dark Mode Notes",
"Whiteboard Teaching Notes",
"Feynman Notes",
"Visual Learning Notes",
"Premium Luxury Notes",
"Ultimate Combination (Best Result)"
];

window.onload = () => {
    ["s1","s2","s3"].forEach(id=>{
        let sel = document.getElementById(id);
        styles.forEach(st=>{
            let opt = document.createElement("option");
            opt.value = st;
            opt.textContent = st;
            sel.appendChild(opt);
        });
    });
};

/* ================= LANGUAGE ================= */
function langRule(lang){
    if(lang==="English") return "Respond ONLY in English.";
    if(lang==="Hindi") return "केवल हिंदी भाषा में उत्तर दें।";
    if(lang==="Gujarati") return "માત્ર ગુજરાતી ભાષામાં જવાબ આપવો.";
}

/* ================= GENERATE ================= */
function generateNotes(){

    const topic = document.getElementById("topic").value;
    const answer = document.getElementById("answer").value;
    const lang = document.getElementById("language").value;
    const mode = document.getElementById("mode").value;

    if(!topic){
        alert("Enter topic");
        return;
    }

    const prompt = `
generate image

You are an Advanced AI Learning Engine.

LANGUAGE RULE:
${langRule(lang)}

MODE: ${mode}
TOPIC: ${topic}
BASE KNOWLEDGE: ${answer || "Not provided"}

TASK:
Generate clean, structured, visually rich AI study notes.
`;

    document.getElementById("output").value = prompt;
}

/* ================= MIX ================= */
function mixStyles(){

    const topic = document.getElementById("topic").value;
    const answer = document.getElementById("answer").value;
    const lang = document.getElementById("language").value;

    if(!topic){
        alert("Enter topic first");
        return;
    }

    const a = document.getElementById("s1").value;
    const b = document.getElementById("s2").value;
    const c = document.getElementById("s3").value;

    const prompt = `
generate image

You are a futuristic AI Academic Designer.

LANGUAGE RULE:
${langRule(lang)}

TOPIC: ${topic}
BASE KNOWLEDGE: ${answer || "Not provided"}

STYLES:
1. ${a}
2. ${b}
3. ${c}

RULES:
- Visually structured output
- No repetition
- High exam usefulness
- Premium AI design output
`;

    document.getElementById("output").value = prompt;
}

/* ================= COPY ================= */
function copyText(){
    let t = document.getElementById("output");
    t.select();
    document.execCommand("copy");
    alert("Copied!");
}

</script>

</body>
</html>
