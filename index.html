<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Prompt Generator Suite</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.1);
}

/* Tabs */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    background:rgba(255,255,255,0.1);
    color:white;
}

.tab-btn.active{
    background:#3b82f6;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:8px;
    margin-bottom:15px;
    font-size:14px;
}

textarea{
    min-height:120px;
    resize:vertical;
    color:#111;
}

/* Buttons */
button{
    cursor:pointer;
    border:none;
}

.primary-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-weight:600;
    margin-top:10px;
}

.primary-btn:hover{
    background:#2563eb;
}

.copy-btn{
    width:100%;
    padding:12px;
    border-radius:12px;
    background:#10b981;
    margin-top:10px;
    color:white;
}

/* Output */
.output{
    background:#0f172a;
    color:#e2e8f0;
}

/* Upload box */
.upload{
    border:2px dashed rgba(255,255,255,0.3);
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    margin-bottom:15px;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;margin-bottom:15px;">AI Prompt Generator Suite</h2>

<!-- Tabs -->
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('qna')">Q&A Prompt Generator</button>
    <button class="tab-btn" onclick="switchTab('study')">Study Notes Generator</button>
</div>

<!-- ================= QNA TOOL ================= -->
<div id="qna" class="section active">

    <label>Language</label>
    <select id="q_lang">
        <option value="en">English</option>
        <option value="gu">Gujarati</option>
    </select>

    <!-- ✅ NEW FEATURE -->
    <label>Notes Type</label>
    <select id="q_notesType">
        <option value="Normal">Normal Q&A</option>
        <option value="Exam">Exam Preparation Notes</option>
        <option value="Flashcard">Flashcard Style (Active Recall)</option>
        <option value="Short">Short Notes</option>
        <option value="Detailed">Detailed Explanation</option>
        <option value="Infographic">Infographic Style</option>
    </select>

    <label>Question</label>
    <textarea id="question"></textarea>

    <label>Answer</label>
    <textarea id="answer"></textarea>

    <button class="primary-btn" onclick="generateQNA()">Generate Prompt</button>

    <h3>Output</h3>
    <textarea id="q_output" class="output" readonly></textarea>
    <button class="copy-btn" onclick="copy('q_output')">Copy</button>

</div>

<!-- ================= STUDY TOOL ================= -->
<div id="study" class="section">

    <label>Topic Heading</label>
    <input id="topic">

    <label>Upload Image / OCR Text</label>
    <div class="upload" onclick="document.getElementById('img').click()">
        Click or Drag Image Here
        <input type="file" id="img" hidden multiple onchange="ocr(event)">
    </div>

    <label>Description</label>
    <textarea id="desc"></textarea>

    <div class="grid">
        <div>
            <label>Notes Type</label>
            <select id="type">
                <option>Short Notes</option>
                <option>Detailed Notes</option>
                <option>Feynman Technique Explainer</option>
                <option>Active Recall Q&A Flashcard Notes</option>
                <option>Cornell Method Notes</option>
            </select>
        </div>

        <div>
            <label>Language</label>
            <select id="lang">
                <option>English</option>
                <option>Gujarati</option>
                <option>Hindi</option>
            </select>
        </div>
    </div>

    <button class="primary-btn" onclick="generateStudy()">Generate Study Prompt</button>

    <h3>Output</h3>
    <textarea id="s_output" class="output" readonly></textarea>
    <button class="copy-btn" onclick="copy('s_output')">Copy</button>

</div>

</div>

<script>

/* TAB SWITCH */
function switchTab(tab){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
}

/* ================= QNA GENERATOR ================= */
function generateQNA(){
    const q = document.getElementById("question").value;
    const a = document.getElementById("answer").value;
    const lang = document.getElementById("q_lang").value;
    const type = document.getElementById("q_notesType").value;

    if(!q || !a){
        alert("Fill Q and A");
        return;
    }

    let style = lang === "gu"
        ? "Gujarati handwritten educational notes style"
        : "Clean English academic infographic style";

    let structure = "";

    switch(type){

        case "Exam":
            structure = `
- Exam-focused structured answer
- Include key headings & important terms
`;
            break;

        case "Flashcard":
            structure = `
Front: Question
Back: Short precise answer
Add revision bullets
`;
            break;

        case "Short":
            structure = `
- Very concise answer
- Only key points
`;
            break;

        case "Detailed":
            structure = `
- Deep explanation step-by-step
- Examples included
`;
            break;

        case "Infographic":
            structure = `
- Visual infographic layout
- Left: Question
- Right: Answer blocks
`;
            break;

        default:
            structure = `Normal Q&A format`;
    }

    const prompt = `
Create a high-quality educational Q&A note.

Structure:
${structure}

Style:
${style}

Question:
${q}

Answer:
${a}
`;

    document.getElementById("q_output").value = prompt;
}

/* ================= STUDY GENERATOR ================= */

const personas = [
"Act as Ivy League professor",
"Act as cognitive psychology expert",
"Act as elite study designer"
];

const structures = [
"Add misconception vs fact table",
"Add 3 critical thinking questions",
"Add mnemonic section"
];

function generateStudy(){
    const topic = document.getElementById("topic").value;
    const desc = document.getElementById("desc").value;
    const type = document.getElementById("type").value;
    const lang = document.getElementById("lang").value;

    if(!topic || !desc){
        alert("Fill topic and description");
        return;
    }

    const prompt = `
${personas[Math.floor(Math.random()*personas.length)]}

Create ${type} on "${topic}"

Content:
${desc}

Language: ${lang}

Rule:
${structures[Math.floor(Math.random()*structures.length)]}

Make it highly structured and academic.
`;

    document.getElementById("s_output").value = prompt;
}

/* COPY */
function copy(id){
    const el = document.getElementById(id);
    el.select();
    document.execCommand("copy");
    alert("Copied!");
}

/* OCR */
async function ocr(e){
    const file = e.target.files[0];
    if(!file) return;

    const result = await Tesseract.recognize(file,'eng');
    document.getElementById("desc").value += "\n" + result.data.text;
}

</script>

</body>
</html>
