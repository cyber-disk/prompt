<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Study Notes Prompt Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:white;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:35px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:38px;
    font-weight:700;
    margin-bottom:10px;
}

.title p{
    color:#cbd5e1;
}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

input,
textarea,
select{
    width:100%;
    padding:14px 16px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#f8fafc;
    color:#111827;
    font-size:15px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

button{
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.generate-btn{
    width:100%;
    padding:16px;
    border-radius:14px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    font-size:17px;
    font-weight:600;
    margin-top:10px;
}

.generate-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,0.4);
}

.output-box{
    margin-top:30px;
}

.output-box textarea{
    background:#0f172a;
    color:#e2e8f0;
    border:1px solid rgba(255,255,255,0.1);
}

.copy-btn{
    margin-top:15px;
    width:100%;
    padding:14px;
    border-radius:14px;
    background:#10b981;
    color:white;
    font-size:16px;
    font-weight:600;
}

.copy-btn:hover{
    background:#059669;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}

@media(max-width:768px){

    .row{
        grid-template-columns:1fr;
    }

    .title h1{
        font-size:28px;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="title">
        <h1>AI Study Notes Prompt Generator</h1>
        <p>Create Professional AI Prompts for Study Notes Instantly</p>
    </div>

    <div class="form-group">
        <label>Topic Heading</label>
        <input type="text" id="topic" placeholder="Enter topic heading">
    </div>

    <div class="form-group">
        <label>Topic Description</label>
        <textarea id="description" placeholder="Write topic details..."></textarea>
    </div>

    <div class="row">

        <div class="form-group">
            <label>Notes Type</label>
            <select id="notesType">
                <option>Short Notes</option>
                <option>Detailed Notes</option>
                <option>Exam Preparation Notes</option>
                <option>Mind Map Style Notes</option>
                <option>Bullet Point Notes</option>
                <option>Revision Notes</option>
            </select>
        </div>

        <div class="form-group">
            <label>Language</label>
            <select id="language">
                <option>English</option>
                <option>Gujarati</option>
                <option>Hindi</option>
                <option>Urdu</option>
                <option>Marathi</option>
            </select>
        </div>

    </div>

    <button class="generate-btn" onclick="generatePrompt()">
        Generate Professional Prompt
    </button>

    <div class="output-box">
        <label>Generated Prompt</label>
        <textarea id="output" readonly placeholder="Your professional prompt will appear here..."></textarea>

        <button class="copy-btn" onclick="copyPrompt()">
            Copy Prompt
        </button>
    </div>

    <div class="footer">
        Designed for Professional AI Prompt Creation
    </div>

</div>

<script>

function generatePrompt(){

    const topic = document.getElementById("topic").value;
    const description = document.getElementById("description").value;
    const notesType = document.getElementById("notesType").value;
    const language = document.getElementById("language").value;

    if(topic === "" || description === ""){
        alert("Please fill all required fields.");
        return;
    }

    const prompt = `
Create highly professional and visually attractive ${notesType} on the topic "${topic}".

Topic Description:
${description}

Requirements:
- The notes should be well-structured and easy to understand.
- Use professional educational formatting.
- Include important headings, subheadings, bullet points, and key explanations.
- Make the content visually clean and suitable for students.
- Add highlighted key points and summary sections where necessary.
- The notes must look modern, premium, and academic.
- Use readable typography and attractive layout styling.
- Generate the complete notes in ${language} language.
- Ensure the content is accurate, engaging, and student-friendly.
- Make it suitable for AI-generated educational poster or image style notes.

Generate high-quality educational notes design with professional appearance.
`;

    document.getElementById("output").value = prompt;

}

function copyPrompt(){

    const output = document.getElementById("output");

    output.select();
    output.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(output.value);

    alert("Prompt Copied Successfully!");

}

</script>

</body>
</html>
